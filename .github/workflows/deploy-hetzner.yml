name: Deploy Prime Staffing Limited to Hetzner

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy on Hetzner via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT }}
          script: |
            set -e
            echo "Starting Prime Staffing Limited deployment"
            mkdir -p /var/www/primestaffing
            cd /var/www/primestaffing
            if [ ! -d app/.git ]; then
              echo "Fresh clone"
              rm -rf app
              git clone -b master https://x-access-token:${{ secrets.GH_DEPLOY_TOKEN }}@github.com/Shahil-AppDev/prime-staffing-limited.git app
            else
              cd app
              git remote set-url origin https://x-access-token:${{ secrets.GH_DEPLOY_TOKEN }}@github.com/Shahil-AppDev/prime-staffing-limited.git
              cd ..
            fi
            cd /var/www/primestaffing/app
            echo "Pull latest code"
            git fetch origin master
            git reset --hard origin/master
            echo "Check production env"
            test -f .env.production || (echo "Missing .env.production on server" && exit 1)
            echo "Docker versions"
            docker --version
            docker compose version
            echo "Build and restart containers"
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
            echo "Prisma setup"
            docker compose -f docker-compose.prod.yml exec -T backend pnpm prisma migrate deploy || true
            docker compose -f docker-compose.prod.yml exec -T backend pnpm prisma generate || true
            echo "Container status"
            docker compose -f docker-compose.prod.yml ps
            echo "Health checks"
            curl -I http://127.0.0.1:3009 || true
            curl -I http://127.0.0.1:3010 || true
            curl -I http://127.0.0.1:4012 || true
            echo "Deployment completed"
